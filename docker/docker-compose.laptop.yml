# Laptop deployment: dictation daemon only (STT + MCP run on ai-station)
# Usage: docker compose -f docker/docker-compose.laptop.yml up -d
services:
  daemon:
    build:
      context: ..
      dockerfile: docker/Dockerfile.app
    container_name: babel-tower-daemon
    command: ["python", "-m", "babel_tower.cli", "daemon"]
    environment:
      - PULSE_SERVER=unix:/tmp/pulse.socket
      - BABEL_STT_URL=http://ai-station:29000
      - BABEL_STT_HOTWORDS=${BABEL_STT_HOTWORDS:-}
      - BABEL_STT_PROMPT=${BABEL_STT_PROMPT:-}
      - BABEL_STT_CORRECTIONS=${BABEL_STT_CORRECTIONS:-}
      - BABEL_LLM_URL=http://ai-station:4000
      - BABEL_DEFAULT_MODE=structure
      - WAYLAND_DISPLAY=${WAYLAND_DISPLAY:-wayland-0}
    volumes:
      - ${XDG_RUNTIME_DIR:-/run/user/1000}/pulse/native:/tmp/pulse.socket
      - ${XDG_RUNTIME_DIR:-/run/user/1000}/${WAYLAND_DISPLAY:-wayland-0}:/tmp/${WAYLAND_DISPLAY:-wayland-0}
    user: "${UID:-1000}:${GID:-1000}"
    restart: unless-stopped
